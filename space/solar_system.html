<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太陽系互動圖</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000008; overflow: hidden; font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; }
    canvas { display: block; }

    #title {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      color: rgba(180,220,255,0.85);
      font-size: 1.05rem;
      letter-spacing: 4px;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(100,180,255,0.5);
      white-space: nowrap;
    }

    #back-btn {
      position: fixed;
      top: 18px; left: 20px;
      color: #64748b;
      font-size: 0.8rem;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid rgba(100,116,139,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      transition: color 0.15s, border-color 0.15s;
      z-index: 10;
    }
    #back-btn:hover { color: #cbd5e1; border-color: rgba(148,163,184,0.5); }

    #galaxy-btn {
      position: fixed;
      top: 18px; right: 20px;
      color: #64748b;
      font-size: 0.8rem;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid rgba(100,116,139,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      transition: color 0.15s, border-color 0.15s;
      z-index: 10;
    }
    #galaxy-btn:hover { color: #cbd5e1; border-color: rgba(148,163,184,0.5); }

    #shuttle-btn {
      position: fixed;
      top: 58px; right: 20px;
      color: #64748b;
      font-size: 0.8rem;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid rgba(100,116,139,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      transition: color 0.15s, border-color 0.15s;
      z-index: 10;
    }
    #shuttle-btn:hover { color: #cbd5e1; border-color: rgba(148,163,184,0.5); }

    #rocket-btn {
      position: fixed;
      top: 98px; right: 20px;
      color: #64748b;
      font-size: 0.8rem;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid rgba(100,116,139,0.3);
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      transition: color 0.15s, border-color 0.15s;
      z-index: 10;
    }
    #rocket-btn:hover { color: #cbd5e1; border-color: rgba(148,163,184,0.5); }

    #tooltip {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.18s;
    }
    #tooltip.visible { opacity: 1; }
    .tooltip-box {
      background: rgba(6,16,34,0.96);
      border: 1px solid rgba(100,180,255,0.35);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 220px;
      max-width: 300px;
      color: #e8f4ff;
      box-shadow: 0 0 30px rgba(50,120,220,0.25);
      backdrop-filter: blur(10px);
    }
    .tooltip-box h2 {
      font-size: 1.1rem;
      color: #7dd3fc;
      margin-bottom: 2px;
    }
    .tt-en {
      font-size: 0.72rem;
      color: #475569;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.78rem;
      padding: 3px 0;
      border-bottom: 1px solid rgba(100,180,255,0.1);
      color: #cbd5e1;
    }
    .tt-row:last-of-type { border-bottom: none; }
    .tt-row span:first-child { color: #7dd3fc; white-space: nowrap; }
    .tt-row span:last-child { text-align: right; }
    .tt-desc {
      margin-top: 10px;
      font-size: 0.78rem;
      line-height: 1.7;
      color: #94a3b8;
    }

    #controls {
      position: fixed;
      bottom: 22px; right: 20px;
      color: #94a3b8;
      font-size: 0.8rem;
      z-index: 10;
    }
    #controls label { display: block; margin-bottom: 6px; }
    #speed-slider { width: 130px; cursor: pointer; accent-color: #7dd3fc; }

    #legend {
      position: fixed;
      bottom: 22px; left: 20px;
      color: #374151;
      font-size: 0.72rem;
      line-height: 2;
      pointer-events: none;
    }
  </style>
  <script defer src="../analytics-consent.js"></script>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">太 陽 系 互 動 圖</div>
<a id="back-btn" href="../index.html">← 返回首頁</a>
<a id="galaxy-btn" href="galaxy.html">放大至銀河系 →</a>
<a id="star-btn" href="star_lifecycle.html" style="position: fixed; top: 58px; right: 20px; color: #64748b; font-size: 0.8rem; text-decoration: none; padding: 6px 12px; border: 1px solid rgba(100,116,139,0.3); border-radius: 8px; background: rgba(0,0,0,0.5); transition: color 0.15s, border-color 0.15s; z-index: 10;">恆星生命週期 →</a>
<a id="shuttle-btn" href="space_shuttle.html" style="top: 98px;">太空梭構造 →</a>
<a id="rocket-btn" href="modern_rockets.html" style="top: 138px;">現代火箭構造 →</a>
<div id="tooltip"><div class="tooltip-box" id="tt-content"></div></div>

<div id="controls">
  <label>公轉速度 <span id="speed-val">1.0×</span></label>
  <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1" />
</div>

<div id="legend">
  <div>懸停星體 → 查看詳細資訊</div>
  <div>滑鼠滾輪 → 縮放</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const ttContent = document.getElementById('tt-content');
const speedSlider = document.getElementById('speed-slider');
const speedValEl = document.getElementById('speed-val');

let W, H, cx, cy, baseScale;
let zoomLevel = 1, targetZoom = 1;
let speedMult = 1;
let t = 0;
let hoveredObj = null;
let mouseX = 0, mouseY = 0;
let stars = [];
let asteroids = [];
let kuiperAsteroids = [];

// ── Data ─────────────────────────────────────────────────────────────────────

const SUN_DATA = {
  name: '太陽', en: 'Sun', type: 'star',
  stats: { 直徑: '139.2 萬 km', 質量: '1.99×10³⁰ kg', 表面溫度: '5,778 K', 類型: '黃矮星' },
  desc: '太陽是太陽系唯一的恆星，佔太陽系總質量的 99.86%。核心溫度高達 1,500 萬°C，靠核融合反應持續發光發熱。',
};

const PLANETS = [
  {
    name: '水星', en: 'Mercury', type: 'planet',
    of: 0.115, rf: 0.0055, color: '#ADADAD',
    speed: 4.74, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '4,879 km', 距日距離: '0.39 AU', 公轉週期: '87.97 天', 衛星數: '0' },
    desc: '太陽系最小、最靠近太陽的行星。幾乎沒有大氣層，晝夜溫差極大（+430°C 至 −180°C）。',
  },
  {
    name: '金星', en: 'Venus', type: 'planet',
    of: 0.175, rf: 0.012, color: '#E8C97A',
    speed: 3.50, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '12,104 km', 距日距離: '0.72 AU', 公轉週期: '224.7 天', 衛星數: '0' },
    desc: '太陽系中最熱的行星，表面均溫 465°C。濃厚的二氧化碳大氣造成強烈溫室效應，自轉方向與多數行星相反。',
  },
  {
    name: '地球', en: 'Earth', type: 'planet',
    of: 0.240, rf: 0.013, color: '#2E86AB',
    speed: 3.00, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '12,742 km', 距日距離: '1.00 AU', 公轉週期: '365.25 天', 衛星數: '1（月球）' },
    desc: '目前已知唯一孕育生命的行星。擁有液態水海洋、適宜的大氣層與磁場保護。',
  },
  {
    name: '火星', en: 'Mars', type: 'planet',
    of: 0.310, rf: 0.009, color: '#CD4A2C',
    speed: 2.41, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '6,779 km', 距日距離: '1.52 AU', 公轉週期: '686.97 天', 衛星數: '2' },
    desc: '被稱為「紅色星球」，富含氧化鐵使表面呈紅色。擁有太陽系最高的火山（奧林帕斯山，高 21.9 km）。',
  },
  {
    name: '木星', en: 'Jupiter', type: 'planet',
    of: 0.460, rf: 0.034, color: '#C88B3A', stripes: true,
    speed: 1.31, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '139,820 km', 距日距離: '5.20 AU', 公轉週期: '11.86 年', 衛星數: '95+' },
    desc: '太陽系最大行星，質量為其他行星總和的 2.5 倍。著名的「大紅斑」是持續超過 350 年的超大型颶風。',
  },
  {
    name: '土星', en: 'Saturn', type: 'planet',
    of: 0.570, rf: 0.027, color: '#EDD28C',
    rings: { innerFrac: 1.4, outerFrac: 2.35, tilt: 0.42, color: 'rgba(210,185,130,0.58)' },
    speed: 0.97, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '116,460 km', 距日距離: '9.58 AU', 公轉週期: '29.46 年', 衛星數: '146+' },
    desc: '以壯觀的行星環聞名，環由冰塊與岩石碎片組成，寬度達 27 萬 km 但厚度僅約 10 m。',
  },
  {
    name: '天王星', en: 'Uranus', type: 'planet',
    of: 0.695, rf: 0.020, color: '#7DE8E8',
    speed: 0.68, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '50,724 km', 距日距離: '19.2 AU', 公轉週期: '84.02 年', 衛星數: '28' },
    desc: '自轉軸傾斜高達 97.77°，幾乎是「躺著」繞日公轉。大氣中的甲烷使其呈特有的藍綠色。',
  },
  {
    name: '海王星', en: 'Neptune', type: 'planet',
    of: 0.800, rf: 0.018, color: '#3F54BA',
    speed: 0.54, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '49,244 km', 距日距離: '30.1 AU', 公轉週期: '164.8 年', 衛星數: '16' },
    desc: '太陽系最遠的行星，擁有太陽系最強的風（最高達 2,100 km/h）。',
  },
  {
    name: '冥王星', en: 'Pluto', type: 'dwarf',
    of: 0.900, rf: 0.004, color: '#C0B0A8',
    speed: 0.47, sa: Math.random() * Math.PI * 2,
    stats: { 直徑: '2,376 km', 距日距離: '39.5 AU', 公轉週期: '247.9 年', 分類: '矮行星（2006 重分類）' },
    desc: '曾被列為第九大行星，2006 年重新分類為「矮行星」。擁有心形地形「湯博區」，由氮冰與一氧化碳冰組成。',
  },
];

const BELT = {
  name: '小行星帶', en: 'Asteroid Belt', type: 'belt',
  innerF: 0.370, outerF: 0.418,
  stats: { 位置: '火星與木星之間（2.2–3.2 AU）', 主要成分: '岩石、金屬、碳化物', 最大天體: '穀神星（Ceres）', 總質量: '月球質量的 4%' },
  desc: '位於火星和木星軌道之間的環形區域，包含數百萬顆小行星。木星的重力阻止了這些物質聚集成行星。',
};

const KUIPER_BELT = {
  name: '古柏帶', en: 'Kuiper Belt', type: 'belt',
  innerF: 0.820, outerF: 0.960,
  stats: { 位置: '海王星軌道外（30–50 AU）', 主要成分: '冰、岩石', 已知天體: '2,000+', 代表天體: '冥王星、鬩神星、鳥神星' },
  desc: '位於海王星軌道之外的環形區域，包含大量冰質天體，是短週期彗星的來源。冥王星是其中最著名的成員。比小行星帶大 20 倍、質量大 20–200 倍。',
};

// ── Init ──────────────────────────────────────────────────────────────────────

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  baseScale = Math.min(W, H) / 2 * 0.90;
}

function genStars(n = 700) {
  stars = Array.from({ length: n }, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.1 + 0.2,
    a: Math.random() * 0.75 + 0.25,
  }));
}

function genAsteroids(n = 600) {
  asteroids = Array.from({ length: n }, () => ({
    angle: Math.random() * Math.PI * 2,
    frac: BELT.innerF + Math.random() * (BELT.outerF - BELT.innerF),
    sz: Math.random() * 1.2 + 0.3,
  }));
}

function genKuiperBelt(n = 1200) {
  kuiperAsteroids = Array.from({ length: n }, () => ({
    angle: Math.random() * Math.PI * 2,
    frac: KUIPER_BELT.innerF + Math.random() * (KUIPER_BELT.outerF - KUIPER_BELT.innerF),
    sz: Math.random() * 0.9 + 0.2,
  }));
}

resize();
genStars();
genAsteroids();
genKuiperBelt();
window.addEventListener('resize', resize);

// ── Zoom ──────────────────────────────────────────────────────────────────────

window.addEventListener('wheel', e => {
  targetZoom *= e.deltaY < 0 ? 1.1 : 0.909;
  targetZoom = Math.max(0.35, Math.min(3.5, targetZoom));
  e.preventDefault();
}, { passive: false });

// ── Speed ─────────────────────────────────────────────────────────────────────

speedSlider.addEventListener('input', () => {
  speedMult = parseFloat(speedSlider.value);
  speedValEl.textContent = speedMult.toFixed(1) + '×';
});

// ── Color helpers ─────────────────────────────────────────────────────────────

function adjustColor(hex, delta) {
  const n = parseInt(hex.replace('#', ''), 16);
  const clamp = v => Math.min(255, Math.max(0, v));
  const r = clamp((n >> 16) + delta);
  const g = clamp(((n >> 8) & 0xFF) + delta);
  const b = clamp((n & 0xFF) + delta);
  return `rgb(${r},${g},${b})`;
}

// ── Draw helpers ──────────────────────────────────────────────────────────────

function drawStarsBg() {
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });
}

function sc(frac) { return frac * baseScale * zoomLevel; }

function drawOrbit(frac, dash = false) {
  ctx.beginPath();
  ctx.arc(cx, cy, sc(frac), 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(40,70,100,0.45)';
  ctx.lineWidth = 1;
  ctx.setLineDash(dash ? [3, 8] : []);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawSun() {
  const r = sc(0.060);
  // outer glow
  [[r * 3.0, 0.03], [r * 2.0, 0.09], [r * 1.4, 0.22]].forEach(([gr, ga]) => {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, gr);
    g.addColorStop(0, `rgba(255,150,0,${ga})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, gr, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  });
  // core
  const g = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
  g.addColorStop(0, '#FFFAAA');
  g.addColorStop(0.45, '#FDB813');
  g.addColorStop(1, '#FF5500');
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
}

function planetPos(p) {
  const angle = p.sa + t * p.speed * 0.005;
  const orbitR = sc(p.of);
  return { x: cx + Math.cos(angle) * orbitR, y: cy + Math.sin(angle) * orbitR, r: sc(p.rf) };
}

function drawPlanet(p) {
  const { x, y, r } = planetPos(p);

  // Saturn rings (draw behind planet)
  if (p.rings) {
    const ri = r * p.rings.innerFrac;
    const ro = r * p.rings.outerFrac;
    const tilt = p.rings.tilt;
    ctx.beginPath();
    ctx.ellipse(x, y, ro, ro * tilt, 0, 0, Math.PI * 2);
    ctx.lineWidth = (ro - ri);
    ctx.strokeStyle = p.rings.color;
    ctx.stroke();
  }

  // Planet body
  const rFinal = Math.max(r, 2.5);
  const g = ctx.createRadialGradient(x - rFinal * 0.3, y - rFinal * 0.3, 0, x, y, rFinal);
  g.addColorStop(0, adjustColor(p.color, 55));
  g.addColorStop(0.5, p.color);
  g.addColorStop(1, adjustColor(p.color, -55));
  ctx.beginPath();
  ctx.arc(x, y, rFinal, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();

  // Jupiter stripes
  if (p.stripes && r > 4) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, rFinal, 0, Math.PI * 2);
    ctx.clip();
    for (let i = -4; i <= 4; i++) {
      ctx.fillStyle = 'rgba(100,55,10,0.22)';
      ctx.fillRect(x - rFinal, y + i * rFinal * 0.44 - rFinal * 0.13, rFinal * 2, rFinal * 0.22);
    }
    ctx.restore();
  }

  // Label
  const fontSize = Math.max(9, Math.round(11 * Math.min(zoomLevel, 1.5)));
  ctx.font = `${fontSize}px 'Microsoft JhengHei', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(160,200,255,0.72)';
  ctx.fillText(p.name, x, y + rFinal + fontSize + 2);
}

function drawAsteroidBelt() {
  const beltRot = t * 0.0001;
  asteroids.forEach(a => {
    const angle = a.angle + beltRot;
    const r = sc(a.frac);
    const ax = cx + Math.cos(angle) * r;
    const ay = cy + Math.sin(angle) * r;
    const sz = Math.max(0.3, a.sz * Math.min(zoomLevel, 1.2));
    ctx.beginPath();
    ctx.arc(ax, ay, sz, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(110,100,80,0.55)';
    ctx.fill();
  });
}

function drawKuiperBelt() {
  const beltRot = t * 0.00005;
  kuiperAsteroids.forEach(a => {
    const angle = a.angle + beltRot;
    const r = sc(a.frac);
    const ax = cx + Math.cos(angle) * r;
    const ay = cy + Math.sin(angle) * r;
    const sz = Math.max(0.2, a.sz * Math.min(zoomLevel, 1.2));
    ctx.beginPath();
    ctx.arc(ax, ay, sz, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(119,153,187,0.5)';
    ctx.fill();
  });
}

// ── Hover detection ───────────────────────────────────────────────────────────

function checkHover(mx, my) {
  const dx = mx - cx, dy = my - cy;
  // Sun
  if (Math.hypot(dx, dy) < sc(0.060)) return SUN_DATA;
  // Planets (reverse order so front ones take priority)
  for (let i = PLANETS.length - 1; i >= 0; i--) {
    const p = PLANETS[i];
    const { x, y, r } = planetPos(p);
    if (Math.hypot(mx - x, my - y) < Math.max(r, 9)) return p;
  }
  // Asteroid belt ring
  const d = Math.hypot(dx, dy);
  if (d >= sc(BELT.innerF) && d <= sc(BELT.outerF)) return BELT;
  // Kuiper belt ring
  if (d >= sc(KUIPER_BELT.innerF) && d <= sc(KUIPER_BELT.outerF)) return KUIPER_BELT;
  return null;
}

function buildTT(data) {
  const badge = { star: '⭐ 恆星', planet: '🪐 行星', dwarf: '🔵 矮行星', belt: '☄️ 星帶' }[data.type] || '';
  let rows = '';
  for (const [k, v] of Object.entries(data.stats || {})) {
    rows += `<div class="tt-row"><span>${k}</span><span>${v}</span></div>`;
  }
  return `
    <h2>${data.name} <small style="font-size:0.68em;color:#475569">${badge}</small></h2>
    <div class="tt-en">${data.en}</div>
    ${rows}
    <div class="tt-desc">${data.desc || ''}</div>
  `;
}

window.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  const hit = checkHover(mouseX, mouseY);
  if (hit) {
    if (hoveredObj !== hit) {
      hoveredObj = hit;
      ttContent.innerHTML = buildTT(hit);
    }
    const m = 16;
    let tx = mouseX + m, ty = mouseY + m;
    if (tx + 320 > W) tx = mouseX - 320 - m;
    if (ty + 290 > H) ty = mouseY - 290 - m;
    tooltip.style.transform = `translate(${tx}px,${ty}px)`;
    tooltip.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    hoveredObj = null;
    tooltip.classList.remove('visible');
    canvas.style.cursor = 'default';
  }
});

// ── Animation loop ────────────────────────────────────────────────────────────

function animate() {
  requestAnimationFrame(animate);
  zoomLevel += (targetZoom - zoomLevel) * 0.1;

  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);

  drawStarsBg();

  // Orbit rings
  PLANETS.forEach(p => drawOrbit(p.of));
  // Belt ring (dashed)
  drawOrbit((BELT.innerF + BELT.outerF) / 2, true);

  drawAsteroidBelt();
  drawKuiperBelt();
  drawSun();
  PLANETS.forEach(drawPlanet);

  t += speedMult;
}

animate();
</script>

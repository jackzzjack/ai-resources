<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI Resources 的互動式知識地圖：沿著 Linux、SONiC、AI 基礎設施與半導體的關係探索。">
  <title>知識地圖｜AI Resources</title>
  <script defer src="analytics-consent.js"></script>
  <style>
    :root { --bg:#090b12; --surface:#111522; --surface-2:#181d2d; --text:#edf2ff; --muted:#9aa7bf; --line:#26334d; --cyan:#44d8ff; --purple:#9677ff; --orange:#ff9b54; --green:#5ce0a3; --pink:#f687c1; }
    * { box-sizing:border-box; } body { margin:0; font-family:Inter,ui-sans-serif,system-ui,"Noto Sans TC",sans-serif; color:var(--text); background:radial-gradient(circle at 15% 0%,#182b4f 0,transparent 27rem),radial-gradient(circle at 90% 80%,#281746 0,transparent 31rem),var(--bg); }
    a { color:inherit; } .topbar { max-width:1440px; margin:auto; padding:22px 28px; display:flex; align-items:center; justify-content:space-between; gap:18px; } .brand { font-weight:800; text-decoration:none; letter-spacing:.02em; } .brand span { color:var(--cyan); } .back { color:var(--muted); text-decoration:none; border:1px solid var(--line); border-radius:999px; padding:9px 14px; font-size:.9rem; } .back:hover { color:var(--text); border-color:var(--cyan); }
    .intro { max-width:1440px; padding:30px 28px 20px; margin:auto; display:grid; grid-template-columns:minmax(0,1fr) 330px; gap:28px; } .eyebrow { color:var(--cyan); text-transform:uppercase; letter-spacing:.16em; font-size:.75rem; font-weight:800; } h1 { font-size:clamp(2.25rem,5vw,4.7rem); margin:.2em 0; line-height:1.05; letter-spacing:-.055em; } .intro p { max-width:750px; color:var(--muted); line-height:1.75; font-size:1.05rem; } .legend { background:color-mix(in srgb,var(--surface) 86%,transparent); border:1px solid var(--line); border-radius:18px; padding:18px; align-self:end; } .legend h2 { margin:0 0 12px; font-size:1rem; } .legend-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; color:var(--muted); font-size:.83rem; } .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; } 
    .controls { max-width:1440px; padding:0 28px 18px; margin:auto; display:flex; flex-wrap:wrap; gap:9px; align-items:center; } .filter { background:var(--surface); border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:9px 13px; cursor:pointer; } .filter:hover,.filter.active { color:var(--text); border-color:var(--cyan); background:#15263a; } .search { margin-left:auto; min-width:220px; background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:10px 14px; color:var(--text); outline:none; } .search:focus { border-color:var(--cyan); }
    .workspace { max-width:1440px; min-height:670px; margin:0 auto 38px; padding:0 28px; display:grid; grid-template-columns:minmax(0,1fr) 310px; gap:15px; } .graph-shell,.panel { background:color-mix(in srgb,var(--surface) 91%,transparent); border:1px solid var(--line); border-radius:20px; overflow:hidden; } .graph-shell { position:relative; min-height:670px; background-image:linear-gradient(#1d29401f 1px,transparent 1px),linear-gradient(90deg,#1d29401f 1px,transparent 1px); background-size:30px 30px; } #graph { display:block; width:100%; height:670px; touch-action:none; } .hint { position:absolute; bottom:15px; left:16px; color:#7d8ba3; font-size:.78rem; pointer-events:none; } .panel { padding:23px; } .panel .label { color:var(--cyan); font-size:.75rem; letter-spacing:.12em; font-weight:800; } .panel h2 { margin:8px 0 10px; font-size:1.65rem; } .panel p { color:var(--muted); line-height:1.65; } .tags { display:flex; flex-wrap:wrap; gap:7px; margin:19px 0; } .tag { background:#202b43; color:#c8d7f4; border-radius:999px; padding:5px 9px; font-size:.78rem; } .open-link { display:inline-block; text-decoration:none; font-weight:700; color:#051018; background:var(--cyan); padding:10px 13px; border-radius:10px; } .related { margin-top:27px; border-top:1px solid var(--line); padding-top:18px; } .related h3 { font-size:.9rem; margin:0 0 9px; color:#cbd6ea; } .related button { border:0; background:transparent; color:var(--cyan); padding:5px 0; display:block; text-align:left; cursor:pointer; font:inherit; } .related button:hover { text-decoration:underline; }
    .edge { stroke:#536581; stroke-opacity:.45; stroke-width:1.4; } .edge.highlight { stroke:var(--cyan); stroke-opacity:.95; stroke-width:2.3; } .node { cursor:pointer; } .node circle { stroke-width:2; transition:r .18s,filter .18s; } .node:hover circle,.node.selected circle { filter:drop-shadow(0 0 9px currentColor); } .node.selected circle { stroke:#fff; stroke-width:3; } .node.dimmed { opacity:.14; } .node text { fill:#eaf1ff; font-size:12px; font-weight:700; pointer-events:none; paint-order:stroke; stroke:#0a0d15; stroke-width:3px; stroke-linejoin:round; } .node .sub { fill:#9fafc8; font-size:9px; font-weight:600; }
    .footer { max-width:1440px; margin:0 auto; padding:0 28px 38px; color:#7e8ba3; font-size:.85rem; } @media(max-width:900px){ .intro,.workspace { grid-template-columns:1fr; } .legend { display:none; } .workspace { min-height:0; } .panel { min-height:220px; } .search { margin-left:0; width:100%; } } @media(max-width:560px){ .topbar,.intro,.controls,.workspace,.footer { padding-left:16px; padding-right:16px; } .graph-shell,#graph { min-height:500px; height:500px; } h1 { font-size:2.5rem; } }
  </style>
</head>
<body>
  <header class="topbar"><a class="brand" href="index.html">AI <span>RESOURCES</span></a><a class="back" href="index.html">← 回到資源入口</a></header>
  <section class="intro"><div><div class="eyebrow">Interactive knowledge graph</div><h1>從一個概念，<br>走到整個系統。</h1><p>這不是依分類排好的清單，而是一張可以探索的關係圖。從 Linux 核心出發，沿著 Driver、PCIe、SerDes、SONiC，一路連到 AI 伺服器、HBM、電源與散熱；每一個節點都能直接進入對應的知識頁。</p></div><aside class="legend"><h2>目前的主題群集</h2><div class="legend-grid"><span><i class="dot" style="background:#44d8ff"></i>Linux / 系統</span><span><i class="dot" style="background:#9677ff"></i>網路 / SONiC</span><span><i class="dot" style="background:#ff9b54"></i>AI 基礎設施</span><span><i class="dot" style="background:#5ce0a3"></i>半導體 / 互連</span><span><i class="dot" style="background:#f687c1"></i>AI 工作流</span></div></aside></section>
  <nav class="controls" aria-label="知識地圖篩選"><button class="filter active" data-group="all">全部關係</button><button class="filter" data-group="system">Linux / 系統</button><button class="filter" data-group="network">網路 / SONiC</button><button class="filter" data-group="infra">AI 基礎設施</button><button class="filter" data-group="silicon">半導體 / 互連</button><button class="filter" data-group="workflow">AI 工作流</button><input id="search" class="search" type="search" placeholder="搜尋：例如 PCIe、HBM、SONiC"></nav>
  <main class="workspace"><section class="graph-shell" aria-label="可縮放、可拖曳的知識關係圖"><svg id="graph" role="img" aria-label="AI Resources 知識關係圖"></svg><span class="hint">拖曳空白處平移 · 滾輪縮放 · 點擊節點查看關聯</span></section><aside class="panel" id="panel" aria-live="polite"></aside></main>
  <footer class="footer">關係是為學習探索而設計的導覽路徑，而非唯一的知識分類方式。這張地圖會隨資源庫成長持續擴充。</footer>
<script>
(() => {
  const nodes = [
    {id:'linux',name:'Linux Kernel',sub:'系統核心',group:'system',x:250,y:325,url:'linux_kernel_overview.html',desc:'理解行程、記憶體、檔案系統、網路與驅動程式等子系統的共同底座。',tags:['核心','子系統','Driver']},
    {id:'pcie',name:'PCIe × Driver',sub:'裝置與匯流排',group:'system',x:395,y:230,url:'pcie_linux_driver.html',desc:'從 PCIe 拓撲、TLP 到 Linux 驅動流程，串起硬體與作業系統。',tags:['PCIe','DMA','Linux Driver']},
    {id:'serdes',name:'SerDes',sub:'高速訊號',group:'silicon',x:550,y:160,url:'serdes_guide.html',desc:'用序列化、等化、CDR 與 PAM4，理解高速資料如何穿過實體互連。',tags:['PAM4','CDR','訊號完整性']},
    {id:'sonic',name:'SONiC',sub:'開放網路 OS',group:'network',x:520,y:350,url:'sonic_nos_guide.html',desc:'容器化網路作業系統，以 Linux、Redis 與 SAI 把控制面連到交換器硬體。',tags:['NOS','SAI','Redis','RoCEv2']},
    {id:'switch',name:'交換器產業',sub:'ASIC × 網路',group:'network',x:700,y:320,url:'switch-industry.html',desc:'從交換器市場、ASIC 與 SerDes，到 CPO 與 AI 網路的產業全景。',tags:['Switch','ASIC','CPO']},
    {id:'router',name:'路由器',sub:'網路分層',group:'network',x:720,y:470,url:'router-industry.html',desc:'理解家用到骨幹級路由器，以及封包如何在網路中選擇路徑。',tags:['Routing','WAN','網路']},
    {id:'aiinfra',name:'AI Infrastructure',sub:'資料中心系統',group:'infra',x:835,y:230,url:'ai-infrastructure.html',desc:'把 GPU 伺服器、AI 交換器、NVLink／UALink 與光學互連放在同一張系統圖。',tags:['GPU','NVLink','AI Network']},
    {id:'hbm',name:'HBM',sub:'高頻寬記憶體',group:'silicon',x:940,y:345,url:'hbm_memory.html',desc:'從 3D 堆疊、TSV、CoWoS 到世代演進，理解 AI 加速器的記憶體瓶頸。',tags:['Memory','TSV','CoWoS']},
    {id:'thermal',name:'散熱',sub:'熱設計',group:'infra',x:1010,y:495,url:'thermal-industry.html',desc:'氣冷、冷板液冷、CDU：算力密度越高，散熱越成為系統能力。',tags:['Liquid Cooling','CDU','TDP']},
    {id:'power',name:'電源',sub:'能量路徑',group:'infra',x:850,y:555,url:'power-industry.html',desc:'從電網到 PSU，理解 AI 資料中心的供電、效率與產業鏈。',tags:['PSU','電網','效率']},
    {id:'semicon',name:'半導體產業',sub:'設計到封測',group:'silicon',x:680,y:95,url:'semiconductor-industry.html',desc:'把 IC 設計、晶圓代工、封裝測試、設備與材料放回完整供應鏈。',tags:['Foundry','Packaging','Supply Chain']},
    {id:'cpo',name:'CPO',sub:'共封裝光學',group:'silicon',x:830,y:105,url:'cpo-industry.html',desc:'用光學靠近交換 ASIC，降低高速互連功耗、延伸頻寬密度。',tags:['Optics','ASIC','Interconnect']},
    {id:'fiber',name:'光纖接入',sub:'PON 網路',group:'network',x:630,y:535,url:'fiber-optic-industry.html',desc:'從 OLT、ONU 到 PON，理解接入網如何把光纖帶到終端。',tags:['PON','OLT','ONU']},
    {id:'ai-models',name:'AI Models',sub:'模型選擇',group:'workflow',x:190,y:125,url:'ai-models.html',desc:'比較主流 LLM 的能力、成本與情境，建立模型選擇的心智模型。',tags:['LLM','OpenRouter','推理']},
    {id:'context',name:'Context Window',sub:'脈絡管理',group:'workflow',x:90,y:235,url:'context_windows.html',desc:'把上下文當作有限工作桌：知道何時壓縮、拆分或外部化資訊。',tags:['Context','Prompt','Token']},
    {id:'hermes',name:'Hermes Agents',sub:'工具型 Agent',group:'workflow',x:105,y:420,url:'hermes_agents_guide.html',desc:'以模型、工具、技能和脈絡組成可執行任務的 AI 協作流程。',tags:['Agent','Skills','Tools']},
    {id:'mcp',name:'MCP',sub:'工具協定',group:'workflow',x:250,y:510,url:'mcp_guide.html',desc:'以共同協定讓 AI 安全連接資料、工具與外部服務。',tags:['Protocol','Tools','Integration']},
    {id:'fiveg',name:'5G Architecture',sub:'電信網路',group:'network',x:405,y:525,url:'5g_architecture.html',desc:'探索服務化架構、網路切片與行動網路的控制／使用者平面。',tags:['SBA','Slicing','Mobile']}
  ];
  const edges = [['linux','pcie'],['linux','sonic'],['linux','hermes'],['pcie','serdes'],['pcie','semicon'],['serdes','switch'],['serdes','cpo'],['sonic','switch'],['sonic','aiinfra'],['switch','aiinfra'],['switch','router'],['switch','cpo'],['router','fiber'],['fiber','fiveg'],['semicon','hbm'],['semicon','cpo'],['aiinfra','hbm'],['aiinfra','thermal'],['aiinfra','power'],['hbm','thermal'],['thermal','power'],['ai-models','context'],['context','hermes'],['hermes','mcp'],['mcp','linux']];
  const colors={system:'#44d8ff',network:'#9677ff',infra:'#ff9b54',silicon:'#5ce0a3',workflow:'#f687c1'};
  const byId=Object.fromEntries(nodes.map(n=>[n.id,n])); const svg=document.querySelector('#graph'); const panel=document.querySelector('#panel'); let selected='sonic', group='all', query='', transform={x:0,y:0,k:1}, dragging=false, start={};
  function related(id){return edges.filter(e=>e.includes(id)).map(e=>byId[e[0]===id?e[1]:e[0]]);}
  function visible(n){return (group==='all'||n.group===group)&&(!query||`${n.name} ${n.sub} ${n.tags.join(' ')}`.toLowerCase().includes(query));}
  function renderPanel(n){const rel=related(n.id); panel.innerHTML=`<div class="label">${n.group.toUpperCase()} · ${rel.length} 個連結</div><h2>${n.name}</h2><p>${n.desc}</p><div class="tags">${n.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><a class="open-link" href="${n.url}">閱讀「${n.name}」 →</a><div class="related"><h3>直接相連的概念</h3>${rel.map(r=>`<button data-node="${r.id}">↗ ${r.name}</button>`).join('')||'<p>尚未建立關聯。</p>'}</div>`; panel.querySelectorAll('[data-node]').forEach(b=>b.onclick=()=>select(b.dataset.node));}
  function render(){const active=byId[selected]; const show=new Set(nodes.filter(visible).map(n=>n.id)); const connected=new Set([selected,...related(selected).map(n=>n.id)]); const lineMarkup=edges.map(([a,b])=>{const A=byId[a],B=byId[b],hi=selected&&(a===selected||b===selected); const dim=!show.has(a)||!show.has(b); return `<line class="edge ${hi?'highlight':''}" ${dim?'opacity="0"':''} x1="${A.x}" y1="${A.y}" x2="${B.x}" y2="${B.y}"/>`;}).join(''); const nodeMarkup=nodes.map(n=>{const dim=!show.has(n.id); const r=n.id===selected?28:22; return `<g class="node ${n.id===selected?'selected':''} ${dim?'dimmed':''}" data-id="${n.id}" transform="translate(${n.x} ${n.y})" style="color:${colors[n.group]}"><circle r="${r}" fill="${colors[n.group]}" fill-opacity=".22" stroke="${colors[n.group]}"/><text text-anchor="middle" y="5">${n.name}</text><text class="sub" text-anchor="middle" y="${r+15}">${n.sub}</text></g>`;}).join(''); svg.innerHTML=`<g transform="translate(${transform.x} ${transform.y}) scale(${transform.k})">${lineMarkup}${nodeMarkup}</g>`; svg.querySelectorAll('.node').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();select(el.dataset.id)})); renderPanel(active);}
  function select(id){selected=id; render();}
  document.querySelectorAll('.filter').forEach(b=>b.addEventListener('click',()=>{document.querySelector('.filter.active').classList.remove('active');b.classList.add('active');group=b.dataset.group;render();}));
  document.querySelector('#search').addEventListener('input',e=>{query=e.target.value.trim().toLowerCase();render();});
  svg.addEventListener('wheel',e=>{e.preventDefault();const rect=svg.getBoundingClientRect(),px=e.clientX-rect.left,py=e.clientY-rect.top,old=transform.k,next=Math.max(.55,Math.min(1.7,old*(e.deltaY<0?1.12:.89)));transform.x=px-(px-transform.x)*(next/old);transform.y=py-(py-transform.y)*(next/old);transform.k=next;render();},{passive:false});
  svg.addEventListener('pointerdown',e=>{dragging=true;start={x:e.clientX,y:e.clientY,tx:transform.x,ty:transform.y};svg.setPointerCapture(e.pointerId);}); svg.addEventListener('pointermove',e=>{if(!dragging)return;transform.x=start.tx+e.clientX-start.x;transform.y=start.ty+e.clientY-start.y;render();}); svg.addEventListener('pointerup',()=>dragging=false); svg.addEventListener('dblclick',()=>{transform={x:0,y:0,k:1};render();});
  render();
})();
</script>
</body>
</html>
